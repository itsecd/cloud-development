AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cloud formation template for course management project'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket
    Default: 'course-bucket'
  
  TopicName:
    Type: String
    Description: Name for the SNS topic
    Default: 'course-topic'

Resources:
  CourseBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName
      VersioningConfiguration:
        Status: Suspended
      Tags:
        - Key: Name
          Value: !Ref BucketName
        - Key: Environment
          Value: Sample
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CourseTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName
      DisplayName: !Ref TopicName
      Tags:
        - Key: Name
          Value: !Ref TopicName
        - Key: Environment
          Value: Sample

Outputs:  
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref CourseBucket
  
  S3BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt CourseBucket.Arn

  SNSTopicName:
    Description: Name of the SNS topic
    Value: !GetAtt CourseTopic.TopicName
  
  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref CourseTopic