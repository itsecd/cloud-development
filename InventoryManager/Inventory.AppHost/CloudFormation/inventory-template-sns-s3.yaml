AWSTemplateFormatVersion: '2010-09-09'
Description: 'Cloud formation template for inventory project'

Parameters:
  BucketName:
    Type: String
    Description: Name for the S3 bucket
    Default: 'inventory-bucket'

  TopicName:
    Type: String
    Description: Name for the SNS topic
    Default: 'inventory-topic'

Resources:
  InventoryBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref BucketName

  InventoryTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Ref TopicName

Outputs:
  S3BucketName:
    Description: Name of the S3 bucket
    Value: !Ref InventoryBucket

  S3BucketArn:
    Description: ARN of the S3 bucket
    Value: !GetAtt InventoryBucket.Arn

  SNSTopicName:
    Description: Name of the SNS topic
    Value: !GetAtt InventoryTopic.TopicName

  SNSTopicArn:
    Description: ARN of the SNS topic
    Value: !Ref InventoryTopic